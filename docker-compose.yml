services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      PORT: "8080"
    volumes:
      - glimmer-runtime:/app/data/runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    ports:
      - "${GLIMMER_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  glimmer-runtime:
